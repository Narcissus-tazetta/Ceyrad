name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "リリースするバージョン (例: 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ inputs.version }}"
          else
            RAW_VERSION="$GITHUB_REF_NAME"
          fi
          VERSION="${RAW_VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set version from tag
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Support/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Support/Info.plist

      - name: Build Ceyrad.app
        run: ./make-app.sh

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent Ceyrad.app "Ceyrad-${{ steps.vars.outputs.tag }}-macos.zip"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: |
          chmod +x scripts/make_dmg.sh
          ./scripts/make_dmg.sh "${{ steps.vars.outputs.version }}"
          mv "dist/Ceyrad-v${{ steps.vars.outputs.version }}-macos.dmg" "Ceyrad-${{ steps.vars.outputs.tag }}-macos.dmg"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: |
            Ceyrad-${{ steps.vars.outputs.tag }}-macos.zip
            Ceyrad-${{ steps.vars.outputs.tag }}-macos.dmg
          generate_release_notes: true

      # if:にsecretsコンテキストを直接使うと "Unrecognized named-value: 'secrets'" になるため、
      # 事前のステップでSPARKLE_PRIVATE_KEYの有無をoutputに変換してから参照する。
      - name: Check Sparkle key
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: echo "has_key=$([ -n "$SPARKLE_PRIVATE_KEY" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # SPARKLE_PRIVATE_KEY未設定の場合はSparkleの自動アップデートを配信しない
      # （generate_keys で鍵を作りリポジトリのSecretsに登録すると有効になる。詳細はREADME参照）
      - name: Sign update and publish appcast.xml
        if: ${{ steps.sparkle.outputs.has_key == 'true' }}
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          chmod +x scripts/update_appcast.sh
          VERSION="${{ steps.vars.outputs.version }}"
          TAG="${{ steps.vars.outputs.tag }}"
          ZIP_ABS_PATH="$(pwd)/Ceyrad-${TAG}-macos.zip"

          # appcast.xmlはリリースタグではなくmainブランチで管理する。
          # 署名対象のzipは既にビルド済みなのでワークツリーを退避してから
          # mainへ切り替え、appcast.xmlだけを更新してpushする。
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # 「Set version from tag」で書き換えたInfo.plistが残っていると、タグとmainで
          # 内容が異なる場合にcheckoutが失敗するため、切り替え前に元へ戻す
          git checkout -- Support/Info.plist
          git checkout main

          ./scripts/update_appcast.sh \
            "$ZIP_ABS_PATH" \
            "$VERSION" \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/Ceyrad-${TAG}-macos.zip"

          git add appcast.xml
          git commit -m "Update appcast.xml for ${TAG}"
          git push origin main
