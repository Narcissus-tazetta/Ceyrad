name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    # lint.shの`swift format`サブコマンドはSwift 6（Xcode 16）以降の同梱のため、macos-15を使う
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run lint
        run: ./scripts/lint.sh

  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Build
        run: swift build -c release
